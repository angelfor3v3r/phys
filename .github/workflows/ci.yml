name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x64 (AVX2)
            avx2: 'ON'
            artifact: phys-windows-x64-avx2
          - os: windows-latest
            name: Windows x64
            avx2: 'OFF'
            artifact: phys-windows-x64
          - os: macos-latest
            name: macOS ARM64
            avx2: 'OFF'
            artifact: phys-macos-arm64

    runs-on: ${{ matrix.os }}
    name: ${{ matrix.name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Windows: MSVC + Ninja (both pre-installed on windows-latest).
      - name: Setup MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure (Windows)
        if: runner.os == 'Windows'
        run: cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=Release -DPHYS_AVX2=${{ matrix.avx2 }}

      # macOS: LLVM Clang 20 + Ninja.
      - name: Install LLVM Clang 20 and Ninja
        if: runner.os == 'macOS'
        run: |
          brew install llvm@20 ninja
          echo "$(brew --prefix llvm@20)/bin" >> $GITHUB_PATH

      - name: Configure (macOS)
        if: runner.os == 'macOS'
        run: |
          SDKROOT=$(xcrun --show-sdk-path)
          cmake -B build -G Ninja \
            -DCMAKE_C_COMPILER=clang \
            -DCMAKE_CXX_COMPILER=clang++ \
            -DCMAKE_OSX_SYSROOT="$SDKROOT" \
            -DCMAKE_BUILD_TYPE=Release \
            -DPHYS_AVX2=${{ matrix.avx2 }}

      - name: Build
        run: cmake --build build

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/phys.exe

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: build/phys

  # Linux: Flatpak builds using Freedesktop SDK (GCC 15, glibc from runtime).
  flatpak:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux x64 (AVX2)
            avx2: 'ON'
            artifact: phys-linux-x64-avx2
          - name: Linux x64
            avx2: 'OFF'
            artifact: phys-linux-x64

    runs-on: ubuntu-latest
    name: ${{ matrix.name }}
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:freedesktop-25.08
      options: --privileged

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Patch manifest for AVX2
        if: matrix.avx2 == 'ON'
        run: sed -i 's/DPHYS_AVX2=OFF/DPHYS_AVX2=ON/' deploy/linux/io.github.angelfor3v3r.phys.yml

      - name: Build Flatpak
        uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: phys.flatpak
          manifest-path: deploy/linux/io.github.angelfor3v3r.phys.yml
          upload-artifact: false

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: phys.flatpak

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, flatpak]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Package release assets
        run: |
          cd artifacts
          for dir in */; do
            name="${dir%/}"
            cd "$name"
            if ls *.flatpak 1>/dev/null 2>&1; then
              mv *.flatpak "../${name}.flatpak"
            elif ls *.exe 1>/dev/null 2>&1; then
              zip "../${name}.zip" *.exe
            else
              zip "../${name}.zip" *
            fi
            cd ..
          done

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.zip
            artifacts/*.flatpak
