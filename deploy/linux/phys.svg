<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <rect width="256" height="256" rx="32" fill="#1a1a1a"/>

  <!-- Title -->
  <text x="128" y="62" text-anchor="middle" font-family="sans-serif" font-weight="bold"
        font-size="40" fill="#ddd" letter-spacing="2">phys</text>

  <!-- Ground line -->
